<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta SQL — Oracle / SQL Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F6F1;
    --paper-2:#EFEDE5;
    --ink:#1B1D1F;
    --ink-soft:#5B5A54;
    --line:#D9D6CA;
    --line-strong:#B9B6A8;
    --oracle:#A8352E;
    --oracle-dim:#EADAD8;
    --mssql:#1F5C8B;
    --mssql-dim:#D9E4EC;
    --code-bg:#16181A;
    --code-ink:#E7E4D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    padding:48px 24px 80px;
  }
  .wrap{ max-width:760px; margin:0 auto; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin:0 0 8px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:32px;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .sub{ color:var(--ink-soft); font-size:14px; margin:0 0 32px; }

  .switches{ display:flex; gap:14px; margin-bottom:20px; }
  .switch{
    flex:1; display:flex; align-items:center; gap:12px;
    padding:14px 16px; background:var(--paper-2); border:1px solid var(--line);
    border-radius:3px; cursor:pointer; user-select:none;
    transition:border-color .15s ease, background .15s ease;
  }
  .switch .box{ width:20px; height:20px; border:2px solid var(--ink); background:#fff; flex-shrink:0; position:relative; }
  .switch .box::after{ content:''; position:absolute; inset:4px; background:transparent; }
  .switch.active .box::after{ background:var(--dot,var(--ink)); }
  .switch .label{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15px; }
  .switch .tag{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-soft); margin-top:2px; }
  #sw-oracle.active{ border-color:var(--oracle); background:var(--oracle-dim); --dot:var(--oracle); }
  #sw-mssql.active{ border-color:var(--mssql); background:var(--mssql-dim); --dot:var(--mssql); }

  .count{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin:0 0 8px;
  }

  .dropdown-wrap{ position:relative; border:1px solid var(--ink); background:#fff; }
  .dropdown-wrap .prompt{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    font-family:'JetBrains Mono', monospace; font-size:14px; color:var(--ink-soft); pointer-events:none;
  }
  select#cmd{
    width:100%; appearance:none; -webkit-appearance:none; border:none; outline:none;
    background:transparent; padding:16px 40px 16px 34px;
    font-family:'JetBrains Mono', monospace; font-size:15px; color:var(--ink); cursor:pointer;
  }
  .dropdown-wrap .chev{
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    font-family:'JetBrains Mono', monospace; color:var(--ink-soft); pointer-events:none; font-size:13px;
  }

  .panel{ margin-top:24px; border:1px solid var(--line); background:#fff; }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid var(--line); background:var(--paper-2);
  }
  .panel-head .name{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--ink-soft);
  }
  .panel-head .dialect-flag{
    font-family:'JetBrains Mono', monospace; font-size:11px; padding:2px 8px; border-radius:2px;
  }
  .flag-oracle{ background:var(--oracle-dim); color:var(--oracle); }
  .flag-mssql{ background:var(--mssql-dim); color:var(--mssql); }

  #syntax-body{
    font-family:'JetBrains Mono', monospace; font-size:13.5px; line-height:1.7;
    color:var(--code-ink); background:var(--code-bg); padding:20px;
    white-space:pre-wrap; word-break:break-word; min-height:24px;
  }
  #example-body{
    padding:20px; font-size:14.5px; line-height:1.7; color:var(--ink);
    white-space:pre-wrap; font-family:'JetBrains Mono', monospace;
  }
  .placeholder{ color:var(--ink-soft); font-style:italic; font-family:'Inter', sans-serif; }

  @media (max-width:520px){
    .switches{ flex-direction:column; }
    h1{ font-size:26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Referência de sintaxe</p>
  <h1>Consulta de comandos SQL</h1>
  <p class="sub">Escolha o dialeto e selecione um comando na lista.</p>

  <div class="switches">
    <div class="switch active" id="sw-oracle" data-dialect="oracle">
      <div class="box"></div>
      <div><div class="label">Oracle</div><div class="tag">PL/SQL</div></div>
    </div>
    <div class="switch" id="sw-mssql" data-dialect="mssql">
      <div class="box"></div>
      <div><div class="label">Microsoft SQL Server</div><div class="tag">T-SQL</div></div>
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="dropdown-wrap">
    <span class="prompt">&gt;</span>
    <select id="cmd"></select>
    <span class="chev">▾</span>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span class="name">syntax</span>
      <span class="dialect-flag flag-oracle" id="flag1">oracle</span>
    </div>
    <div id="syntax-body"><span class="placeholder">A sintaxe do comando aparece aqui.</span></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span class="name">exemplo de uso</span>
      <span class="dialect-flag flag-oracle" id="flag2">oracle</span>
    </div>
    <div id="example-body"><span class="placeholder">Um exemplo prático aparece aqui.</span></div>
  </div>
</div>

<script>
const CATEGORIES = [
  { id:"dml", label:"DML — manipulação de dados" },
  { id:"ddl", label:"DDL — definição de dados" },
  { id:"constraints", label:"Constraints" },
  { id:"filter", label:"Filtragem e ordenação" },
  { id:"joins", label:"Junções (JOIN)" },
  { id:"setop", label:"Operadores de conjunto" },
  { id:"subq", label:"Subconsultas e CTE" },
  { id:"window", label:"Funções de janela" },
  { id:"agg", label:"Agregação" },
  { id:"page", label:"Paginação" },
  { id:"cond", label:"Condicional" },
  { id:"tcl", label:"Controle de transação" },
  { id:"dcl", label:"Permissões (DCL)" },
  { id:"prog", label:"Objetos programáveis" },
  { id:"textfn", label:"Funções de texto" },
  { id:"datefn", label:"Funções de data" },
  { id:"otherfn", label:"Outras funções" }
];

const DATA = {
  select: { cat:"dml", label:"SELECT", oracle:{
      sintaxe:"SELECT [DISTINCT] coluna1, coluna2, ...\nFROM tabela\n[WHERE condicao]\n[ORDER BY coluna];",
      exemplo:"SELECT nome, salario\nFROM funcionarios\nWHERE salario > 5000\nORDER BY salario DESC;" },
    mssql:{
      sintaxe:"SELECT [DISTINCT] [TOP n] coluna1, coluna2, ...\nFROM tabela\n[WHERE condicao]\n[ORDER BY coluna];",
      exemplo:"SELECT TOP 10 nome, salario\nFROM funcionarios\nWHERE salario > 5000\nORDER BY salario DESC;" } },

  insert: { cat:"dml", label:"INSERT", oracle:{
      sintaxe:"INSERT INTO tabela (coluna1, coluna2, ...)\nVALUES (valor1, valor2, ...);",
      exemplo:"INSERT INTO funcionarios (id, nome, salario)\nVALUES (1, 'Ana Souza', 6200);" },
    mssql:{
      sintaxe:"INSERT INTO tabela (coluna1, coluna2, ...)\nVALUES (valor1, valor2, ...);",
      exemplo:"INSERT INTO funcionarios (id, nome, salario)\nVALUES (1, 'Ana Souza', 6200);" } },

  update: { cat:"dml", label:"UPDATE", oracle:{
      sintaxe:"UPDATE tabela\nSET coluna1 = valor1, coluna2 = valor2\nWHERE condicao;",
      exemplo:"UPDATE funcionarios\nSET salario = salario * 1.10\nWHERE departamento = 'TI';" },
    mssql:{
      sintaxe:"UPDATE tabela\nSET coluna1 = valor1, coluna2 = valor2\nWHERE condicao;",
      exemplo:"UPDATE funcionarios\nSET salario = salario * 1.10\nWHERE departamento = 'TI';" } },

  delete: { cat:"dml", label:"DELETE", oracle:{
      sintaxe:"DELETE FROM tabela\nWHERE condicao;",
      exemplo:"DELETE FROM funcionarios\nWHERE data_desligamento IS NOT NULL;" },
    mssql:{
      sintaxe:"DELETE FROM tabela\nWHERE condicao;",
      exemplo:"DELETE FROM funcionarios\nWHERE data_desligamento IS NOT NULL;" } },

  merge: { cat:"dml", label:"MERGE", oracle:{
      sintaxe:"MERGE INTO tabela_destino d\nUSING tabela_origem o ON (d.chave = o.chave)\nWHEN MATCHED THEN UPDATE SET d.coluna = o.coluna\nWHEN NOT MATCHED THEN INSERT (coluna1, coluna2) VALUES (o.coluna1, o.coluna2);",
      exemplo:"MERGE INTO estoque e\nUSING atualizacoes o ON (e.produto_id = o.produto_id)\nWHEN MATCHED THEN UPDATE SET e.quantidade = o.quantidade\nWHEN NOT MATCHED THEN INSERT (produto_id, quantidade) VALUES (o.produto_id, o.quantidade);" },
    mssql:{
      sintaxe:"MERGE tabela_destino AS d\nUSING tabela_origem AS o ON d.chave = o.chave\nWHEN MATCHED THEN UPDATE SET d.coluna = o.coluna\nWHEN NOT MATCHED THEN INSERT (coluna1, coluna2) VALUES (o.coluna1, o.coluna2);",
      exemplo:"MERGE estoque AS e\nUSING atualizacoes AS o ON e.produto_id = o.produto_id\nWHEN MATCHED THEN UPDATE SET e.quantidade = o.quantidade\nWHEN NOT MATCHED THEN INSERT (produto_id, quantidade) VALUES (o.produto_id, o.quantidade);" } },

  create_table: { cat:"ddl", label:"CREATE TABLE", oracle:{
      sintaxe:"CREATE TABLE tabela (\n  coluna1 TIPO [restricoes],\n  coluna2 TIPO [restricoes],\n  ...\n);",
      exemplo:"CREATE TABLE funcionarios (\n  id NUMBER PRIMARY KEY,\n  nome VARCHAR2(100) NOT NULL,\n  salario NUMBER(10,2)\n);" },
    mssql:{
      sintaxe:"CREATE TABLE tabela (\n  coluna1 TIPO [restricoes],\n  coluna2 TIPO [restricoes],\n  ...\n);",
      exemplo:"CREATE TABLE funcionarios (\n  id INT PRIMARY KEY,\n  nome VARCHAR(100) NOT NULL,\n  salario DECIMAL(10,2)\n);" } },

  alter_table: { cat:"ddl", label:"ALTER TABLE", oracle:{
      sintaxe:"ALTER TABLE tabela ADD coluna TIPO;\n\nALTER TABLE tabela MODIFY coluna TIPO;",
      exemplo:"ALTER TABLE funcionarios\nADD data_admissao DATE;" },
    mssql:{
      sintaxe:"ALTER TABLE tabela ADD coluna TIPO;\n\nALTER TABLE tabela ALTER COLUMN coluna TIPO;",
      exemplo:"ALTER TABLE funcionarios\nADD data_admissao DATE;" } },

  drop_table: { cat:"ddl", label:"DROP TABLE", oracle:{
      sintaxe:"DROP TABLE tabela [CASCADE CONSTRAINTS];",
      exemplo:"DROP TABLE funcionarios_temp CASCADE CONSTRAINTS;" },
    mssql:{
      sintaxe:"DROP TABLE [IF EXISTS] tabela;",
      exemplo:"DROP TABLE IF EXISTS funcionarios_temp;" } },

  truncate_table: { cat:"ddl", label:"TRUNCATE TABLE", oracle:{
      sintaxe:"TRUNCATE TABLE tabela;",
      exemplo:"TRUNCATE TABLE log_temporario;" },
    mssql:{
      sintaxe:"TRUNCATE TABLE tabela;",
      exemplo:"TRUNCATE TABLE log_temporario;" } },

  create_index: { cat:"ddl", label:"CREATE INDEX", oracle:{
      sintaxe:"CREATE INDEX nome_indice\nON tabela (coluna1, coluna2);",
      exemplo:"CREATE INDEX idx_funcionarios_dept\nON funcionarios (departamento);" },
    mssql:{
      sintaxe:"CREATE INDEX nome_indice\nON tabela (coluna1, coluna2);",
      exemplo:"CREATE INDEX idx_funcionarios_dept\nON funcionarios (departamento);" } },

  drop_index: { cat:"ddl", label:"DROP INDEX", oracle:{
      sintaxe:"DROP INDEX nome_indice;",
      exemplo:"DROP INDEX idx_funcionarios_dept;" },
    mssql:{
      sintaxe:"DROP INDEX nome_indice ON tabela;",
      exemplo:"DROP INDEX idx_funcionarios_dept ON funcionarios;" } },

  create_view: { cat:"ddl", label:"CREATE VIEW", oracle:{
      sintaxe:"CREATE OR REPLACE VIEW nome_view AS\nSELECT colunas FROM tabela WHERE condicao;",
      exemplo:"CREATE OR REPLACE VIEW vw_funcionarios_ti AS\nSELECT * FROM funcionarios WHERE departamento = 'TI';" },
    mssql:{
      sintaxe:"CREATE OR ALTER VIEW nome_view AS\nSELECT colunas FROM tabela WHERE condicao;",
      exemplo:"CREATE OR ALTER VIEW vw_funcionarios_ti AS\nSELECT * FROM funcionarios WHERE departamento = 'TI';" } },

  drop_view: { cat:"ddl", label:"DROP VIEW", oracle:{
      sintaxe:"DROP VIEW nome_view;",
      exemplo:"DROP VIEW vw_funcionarios_ti;" },
    mssql:{
      sintaxe:"DROP VIEW [IF EXISTS] nome_view;",
      exemplo:"DROP VIEW IF EXISTS vw_funcionarios_ti;" } },

  rename_table: { cat:"ddl", label:"RENOMEAR TABELA", oracle:{
      sintaxe:"RENAME tabela_antiga TO tabela_nova;",
      exemplo:"RENAME funcionarios_bkp TO funcionarios_2025;" },
    mssql:{
      sintaxe:"EXEC sp_rename 'tabela_antiga', 'tabela_nova';",
      exemplo:"EXEC sp_rename 'funcionarios_bkp', 'funcionarios_2025';" } },

  create_sequence: { cat:"ddl", label:"CREATE SEQUENCE", oracle:{
      sintaxe:"CREATE SEQUENCE nome_seq\nSTART WITH 1 INCREMENT BY 1;",
      exemplo:"CREATE SEQUENCE seq_funcionarios\nSTART WITH 1 INCREMENT BY 1;" },
    mssql:{
      sintaxe:"CREATE SEQUENCE nome_seq\nSTART WITH 1 INCREMENT BY 1;\n\n-- alternativa comum: coluna IDENTITY(1,1)",
      exemplo:"CREATE SEQUENCE seq_funcionarios\nSTART WITH 1 INCREMENT BY 1;" } },

  drop_sequence: { cat:"ddl", label:"DROP SEQUENCE", oracle:{
      sintaxe:"DROP SEQUENCE nome_seq;",
      exemplo:"DROP SEQUENCE seq_funcionarios;" },
    mssql:{
      sintaxe:"DROP SEQUENCE nome_seq;",
      exemplo:"DROP SEQUENCE seq_funcionarios;" } },

  primary_key: { cat:"constraints", label:"PRIMARY KEY", oracle:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_pk PRIMARY KEY (coluna);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT pk_funcionarios PRIMARY KEY (id);" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_pk PRIMARY KEY (coluna);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT pk_funcionarios PRIMARY KEY (id);" } },

  foreign_key: { cat:"constraints", label:"FOREIGN KEY", oracle:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_fk FOREIGN KEY (coluna)\nREFERENCES tabela_ref (coluna_ref);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT fk_departamento FOREIGN KEY (dept_id)\nREFERENCES departamentos (id);" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_fk FOREIGN KEY (coluna)\nREFERENCES tabela_ref (coluna_ref);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT fk_departamento FOREIGN KEY (dept_id)\nREFERENCES departamentos (id);" } },

  unique_constraint: { cat:"constraints", label:"UNIQUE", oracle:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_uq UNIQUE (coluna);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT uq_email UNIQUE (email);" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_uq UNIQUE (coluna);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT uq_email UNIQUE (email);" } },

  check_constraint: { cat:"constraints", label:"CHECK", oracle:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_ck CHECK (condicao);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT ck_salario CHECK (salario > 0);" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_ck CHECK (condicao);",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT ck_salario CHECK (salario > 0);" } },

  default_constraint: { cat:"constraints", label:"DEFAULT", oracle:{
      sintaxe:"ALTER TABLE tabela\nMODIFY coluna DEFAULT valor;",
      exemplo:"ALTER TABLE funcionarios\nMODIFY ativo DEFAULT 1;" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nADD CONSTRAINT nome_df DEFAULT valor FOR coluna;",
      exemplo:"ALTER TABLE funcionarios\nADD CONSTRAINT df_ativo DEFAULT 1 FOR ativo;" } },

  not_null: { cat:"constraints", label:"NOT NULL", oracle:{
      sintaxe:"ALTER TABLE tabela\nMODIFY coluna NOT NULL;",
      exemplo:"ALTER TABLE funcionarios\nMODIFY nome NOT NULL;" },
    mssql:{
      sintaxe:"ALTER TABLE tabela\nALTER COLUMN coluna TIPO NOT NULL;",
      exemplo:"ALTER TABLE funcionarios\nALTER COLUMN nome VARCHAR(100) NOT NULL;" } },

  where_clause: { cat:"filter", label:"WHERE", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE condicao;",
      exemplo:"SELECT nome FROM funcionarios\nWHERE departamento = 'TI';" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE condicao;",
      exemplo:"SELECT nome FROM funcionarios\nWHERE departamento = 'TI';" } },

  order_by: { cat:"filter", label:"ORDER BY", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nORDER BY coluna [ASC|DESC];",
      exemplo:"SELECT nome, salario FROM funcionarios\nORDER BY salario DESC;" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nORDER BY coluna [ASC|DESC];",
      exemplo:"SELECT nome, salario FROM funcionarios\nORDER BY salario DESC;" } },

  group_by: { cat:"filter", label:"GROUP BY", oracle:{
      sintaxe:"SELECT coluna, FUNCAO_AGREGADA(coluna2)\nFROM tabela\nGROUP BY coluna;",
      exemplo:"SELECT departamento, AVG(salario)\nFROM funcionarios\nGROUP BY departamento;" },
    mssql:{
      sintaxe:"SELECT coluna, FUNCAO_AGREGADA(coluna2)\nFROM tabela\nGROUP BY coluna;",
      exemplo:"SELECT departamento, AVG(salario)\nFROM funcionarios\nGROUP BY departamento;" } },

  having: { cat:"filter", label:"HAVING", oracle:{
      sintaxe:"SELECT coluna, FUNCAO_AGREGADA(coluna2)\nFROM tabela\nGROUP BY coluna\nHAVING condicao;",
      exemplo:"SELECT departamento, AVG(salario)\nFROM funcionarios\nGROUP BY departamento\nHAVING AVG(salario) > 4000;" },
    mssql:{
      sintaxe:"SELECT coluna, FUNCAO_AGREGADA(coluna2)\nFROM tabela\nGROUP BY coluna\nHAVING condicao;",
      exemplo:"SELECT departamento, AVG(salario)\nFROM funcionarios\nGROUP BY departamento\nHAVING AVG(salario) > 4000;" } },

  distinct: { cat:"filter", label:"DISTINCT", oracle:{
      sintaxe:"SELECT DISTINCT coluna\nFROM tabela;",
      exemplo:"SELECT DISTINCT departamento\nFROM funcionarios;" },
    mssql:{
      sintaxe:"SELECT DISTINCT coluna\nFROM tabela;",
      exemplo:"SELECT DISTINCT departamento\nFROM funcionarios;" } },

  like_op: { cat:"filter", label:"LIKE", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna LIKE 'padrao%';",
      exemplo:"SELECT nome FROM funcionarios\nWHERE nome LIKE 'A%';" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna LIKE 'padrao%';",
      exemplo:"SELECT nome FROM funcionarios\nWHERE nome LIKE 'A%';" } },

  in_op: { cat:"filter", label:"IN", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna IN (valor1, valor2, ...);",
      exemplo:"SELECT nome FROM funcionarios\nWHERE departamento IN ('TI', 'RH');" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna IN (valor1, valor2, ...);",
      exemplo:"SELECT nome FROM funcionarios\nWHERE departamento IN ('TI', 'RH');" } },

  between_op: { cat:"filter", label:"BETWEEN", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna BETWEEN valor1 AND valor2;",
      exemplo:"SELECT nome, salario FROM funcionarios\nWHERE salario BETWEEN 3000 AND 6000;" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna BETWEEN valor1 AND valor2;",
      exemplo:"SELECT nome, salario FROM funcionarios\nWHERE salario BETWEEN 3000 AND 6000;" } },

  is_null: { cat:"filter", label:"IS NULL", oracle:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna IS [NOT] NULL;",
      exemplo:"SELECT nome FROM funcionarios\nWHERE data_desligamento IS NULL;" },
    mssql:{
      sintaxe:"SELECT colunas FROM tabela\nWHERE coluna IS [NOT] NULL;",
      exemplo:"SELECT nome FROM funcionarios\nWHERE data_desligamento IS NULL;" } },

  inner_join: { cat:"joins", label:"INNER JOIN", oracle:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nINNER JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nINNER JOIN departamentos d ON f.dept_id = d.id;" },
    mssql:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nINNER JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nINNER JOIN departamentos d ON f.dept_id = d.id;" } },

  left_join: { cat:"joins", label:"LEFT JOIN", oracle:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nLEFT JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nLEFT JOIN departamentos d ON f.dept_id = d.id;" },
    mssql:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nLEFT JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nLEFT JOIN departamentos d ON f.dept_id = d.id;" } },

  right_join: { cat:"joins", label:"RIGHT JOIN", oracle:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nRIGHT JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nRIGHT JOIN departamentos d ON f.dept_id = d.id;" },
    mssql:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nRIGHT JOIN tabela_b b ON a.chave = b.chave;",
      exemplo:"SELECT f.nome, d.nome_departamento\nFROM funcionarios f\nRIGHT JOIN departamentos d ON f.dept_id = d.id;" } },

  full_join: { cat:"joins", label:"FULL JOIN", oracle:{
      sintaxe:"SELECT a.coluna, b.coluna\nFROM tabela_a a\nFULL OUTER JOIN tabela_b b ON a.chave = b.chave;",

let dialect = 'oracle';
const select = document.getElementById('cmd');
const syntaxBody = document.getElementById('syntax-body');
const exampleBody = document.getElementById('example-body');
const countEl = document.getElementById('count');

CATEGORIES.forEach(category=>{
  const keysInCat = Object.keys(DATA).filter(k => DATA[k].cat === category.id);
  if(keysInCat.length === 0) return;
  const group = document.createElement('optgroup');
  group.label = category.label;
  keysInCat.forEach(key=>{
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = DATA[key].label;
    group.appendChild(opt);
  });
  select.appendChild(group);
});

countEl.textContent = Object.keys(DATA).length + ' comandos disponiveis';

function render(){
  const key = select.value;
  const item = DATA[key];
  if(!item){
    syntaxBody.innerHTML = '<span class="placeholder">Selecione um comando na lista.</span>';
    exampleBody.innerHTML = '<span class="placeholder">Selecione um comando na lista.</span>';
    return;
  }
  const d = item[dialect];
  syntaxBody.textContent = d.sintaxe;
  exampleBody.textContent = d.exemplo;
}

function setDialect(d){
  dialect = d;
  document.getElementById('sw-oracle').classList.toggle('active', d==='oracle');
  document.getElementById('sw-mssql').classList.toggle('active', d==='mssql');
  const label = d === 'oracle' ? 'oracle' : 'sql server';
  const cls = d === 'oracle' ? 'flag-oracle' : 'flag-mssql';
  ['flag1','flag2'].forEach(id=>{
    const el = document.getElementById(id);
    el.textContent = label;
    el.className = 'dialect-flag ' + cls;
  });
  render();
}

document.getElementById('sw-oracle').addEventListener('click', ()=>setDialect('oracle'));
document.getElementById('sw-mssql').addEventListener('click', ()=>setDialect('mssql'));
select.addEventListener('change', render);

render();
</script>
